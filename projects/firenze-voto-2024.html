<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Florence Votes — Electoral Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0d0d0d; --bg2:#141414; --bg3:#1c1c1c;
      --accent:#c8a96e; --text:#e8e4dc; --muted:#6b6760; --border:#252525;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;display:flex;flex-direction:column;}

    /* TOP BAR */
    .topbar{height:46px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;flex-shrink:0;z-index:500;gap:1rem;}
    .topbar-left{display:flex;align-items:center;gap:1.2rem;flex-shrink:0;}
    .back-link{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);text-decoration:none;letter-spacing:.1em;transition:color .2s;white-space:nowrap;}
    .back-link:hover{color:var(--accent);}
    .topbar-title{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--accent);letter-spacing:.12em;white-space:nowrap;}

    /* SEARCH */
    .search-wrap{flex:1;max-width:380px;position:relative;}
    .search-wrap input{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:.38rem 2.2rem .38rem .8rem;font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none;transition:border-color .2s;}
    .search-wrap input:focus{border-color:var(--accent);}
    .search-wrap input::placeholder{color:var(--muted);font-size:.75rem;}
    .search-btn{position:absolute;right:0;top:0;bottom:0;padding:0 .6rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;transition:color .2s;}
    .search-btn:hover{color:var(--accent);}
    .search-results{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-top:none;z-index:1000;max-height:200px;overflow-y:auto;display:none;}
    .search-result-item{padding:.5rem .8rem;font-size:.75rem;color:var(--muted);cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
    .search-result-item:hover{background:var(--bg3);color:var(--text);}

    /* BASEMAP + LAYER TOGGLE */
    .topbar-right-controls{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
    .ctrl-label{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.08em;white-space:nowrap;}
    .btn-group{display:flex;gap:.25rem;}
    .bm-btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;padding:.28rem .65rem;background:var(--bg3);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .bm-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
    .bm-btn:hover:not(.active){color:var(--text);border-color:var(--muted);}
    .layer-toggle-btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;padding:.28rem .65rem;background:var(--bg3);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .layer-toggle-btn.on{color:#6ec86e;border-color:#6ec86e;}
    .layer-toggle-btn:hover{color:var(--text);border-color:var(--muted);}

    /* DASHBOARD */
    .dashboard{display:flex;flex:1;overflow:hidden;}

    /* PANEL */
    .panel{width:300px;min-width:180px;max-width:520px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;position:relative;}
    .panel::-webkit-scrollbar{width:3px;}
    .panel::-webkit-scrollbar-thumb{background:var(--border);}
    .panel-resize{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:100;background:transparent;transition:background .2s;}
    .panel-resize:hover,.panel-resize.dragging{background:rgba(200,169,110,.4);}
    .panel-section{padding:1rem 1.2rem;border-bottom:1px solid var(--border);flex-shrink:0;}
    .panel-section-label{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.8rem;}
    .control-group{margin-bottom:.85rem;}
    .control-group:last-child{margin-bottom:0;}
    .control-label{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.35rem;display:block;}
    select{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:.45rem .6rem;font-family:'DM Sans',sans-serif;font-size:.8rem;appearance:none;cursor:pointer;outline:none;transition:border-color .2s;}
    select:focus{border-color:var(--accent);}
    .toggle-row{display:flex;gap:.3rem;}
    .toggle-btn{flex:1;padding:.4rem 0;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;background:var(--bg3);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all .2s;}
    .toggle-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
    .toggle-btn:hover:not(.active){color:var(--text);border-color:var(--muted);}

    /* INFO BOX */
    .info-box{min-height:80px;display:flex;flex-direction:column;justify-content:center;}
    .info-placeholder{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--border);text-align:center;letter-spacing:.1em;}
    .info-sezione{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.25rem;display:flex;align-items:center;gap:.4rem;}
    .locked-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block;}
    .info-value{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;line-height:1.1;margin-bottom:.25rem;}
    .info-sub{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.08em;}

    /* LEGEND */
    .legend-bar{height:7px;border-radius:1px;width:100%;margin-bottom:.3rem;}
    .legend-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.05em;}

    /* PIE */
    .pie-wrap{position:relative;height:160px;display:flex;align-items:center;justify-content:center;}
    .chart-empty{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--border);letter-spacing:.1em;text-align:center;}

    /* MAP */
    .map-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
    #map{flex:1;}

    /* BAR */
    .bar-section{height:130px;min-height:60px;max-height:400px;background:var(--bg2);border-top:1px solid var(--border);padding:.5rem .9rem .4rem;flex-shrink:0;position:relative;}
    .bar-resize{position:absolute;top:-4px;left:0;right:0;height:8px;cursor:row-resize;z-index:100;background:transparent;transition:background .2s;}
    .bar-resize:hover,.bar-resize.dragging{background:rgba(200,169,110,.4);}
    .bar-section-label{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.3rem;}
    .bar-chart-wrap{height:calc(100% - 22px);}

    /* LEAFLET */
    .leaflet-container{background:#0d0d0d;}
    .leaflet-control-zoom a{background:var(--bg2)!important;color:var(--muted)!important;border-color:var(--border)!important;}
    .leaflet-control-zoom a:hover{background:var(--bg3)!important;color:var(--text)!important;}
    .leaflet-control-attribution{background:rgba(13,13,13,.7)!important;color:var(--muted)!important;font-size:.58rem!important;}
    .leaflet-control-attribution a{color:var(--muted)!important;}

    /* LOADING */
    .loading{position:absolute;inset:0;background:rgba(13,13,13,.88);display:flex;align-items:center;justify-content:center;z-index:400;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--accent);letter-spacing:.2em;}
    .loading.hidden{display:none;}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="../index.html" class="back-link">← Portfolio</a>
    <span class="topbar-title">Florence & Sesto — Electoral Atlas</span>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search address or place…" autocomplete="off"/>
    <button class="search-btn" id="searchBtn">⌕</button>
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="topbar-right-controls">
    <span class="ctrl-label">Basemap</span>
    <div class="btn-group">
      <button class="bm-btn active" data-bm="dark">Dark</button>
      <button class="bm-btn" data-bm="satellite">Satellite</button>
      <button class="bm-btn" data-bm="osm">OSM</button>
    </div>
    <span class="ctrl-label" style="margin-left:.4rem">Layer</span>
    <button class="layer-toggle-btn on" id="layerToggle">● ON</button>
  </div>
</div>

<div class="dashboard">
  <aside class="panel" id="panel">
    <div class="panel-resize" id="panelResize"></div>
    <div class="panel-section">
      <div class="panel-section-label">Controls</div>
      <div class="control-group">
        <label class="control-label">Election</label>
        <select id="electionSelect">
          <option value="amm2024">Comunali 2024</option>
          <option value="reg2025">Regionali 2025</option>
          <option value="diff">Differences 2025 – 2024</option>
        </select>
      </div>
      <div class="control-group">
        <label class="control-label">Party / List</label>
        <select id="partySelect"></select>
      </div>
      <div class="control-group">
        <label class="control-label">Metric</label>
        <div class="toggle-row">
          <button class="toggle-btn active" data-metric="pct">% Share</button>
          <button class="toggle-btn" data-metric="voti">Abs. Votes</button>
        </div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-label">Selected Sezione</div>
      <div class="info-box" id="infoBox">
        <p class="info-placeholder">— hover or click a sezione —</p>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-label">Legend</div>
      <div class="legend-bar" id="legendBar"></div>
      <div class="legend-labels">
        <span id="legendMin"></span><span id="legendMid"></span><span id="legendMax"></span>
      </div>
    </div>
    <div class="panel-section" style="flex:1">
      <div class="panel-section-label">Sezione breakdown — all parties</div>
      <div class="pie-wrap">
        <p class="chart-empty" id="pieEmpty">Click a sezione to see breakdown</p>
        <canvas id="pieChart" style="display:none"></canvas>
      </div>
    </div>
  </aside>

  <div class="map-wrap">
    <div style="position:relative;flex:1;display:flex;flex-direction:column;">
      <div id="map" style="flex:1;"></div>
      <div class="loading hidden" id="loading">LOADING DATA…</div>
    </div>
    <div class="bar-section" id="barSection">
      <div class="bar-resize" id="barResize"></div>
      <div class="bar-section-label">All sezioni ranked — highest to lowest · Hover bar to highlight sezione</div>
      <div class="bar-chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const DATA_URLS = {
  amm2024: 'https://raw.githubusercontent.com/mmattNN/MattiaNiccoli.github.io/refs/heads/main/data/Amministrative_2024.geojson',
  reg2025: 'https://raw.githubusercontent.com/mmattNN/MattiaNiccoli.github.io/refs/heads/main/data/Regionali_2025.geojson',
  diff:    'https://raw.githubusercontent.com/mmattNN/MattiaNiccoli.github.io/refs/heads/main/data/Differenze_2025_2024.geojson'
}

const PARTIES = {
  amm2024: [
    { id:'PARTITO_DEMOCRATICO_SARA_FUNARO_SINDACA',                          label:'PD',             color:'#cc2222' },
    { id:'FRATELLI_DITALIA_GIORGIA_MELONI',                                  label:'FdI',            color:'#1a3a8f' },
    { id:'PARTITO_POPOLARE_EUROPEO_FORZA_ITALIA_BERLUSCONI_SCHMIDT_SINDACO', label:'FI',             color:'#0070bb' },
    { id:'LISTA_CIVICA_EIKE_SCHMIDT_SINDACO',                                label:'Schmidt (civ.)', color:'#4a90a4' },
    { id:'LEGA_SCHMIDT_SINDACO',                                             label:'Lega',           color:'#009fe3' },
    { id:'MOVIMENTO_5_STELLE_2050',                                          label:'M5S',            color:'#c8a900' },
    { id:'ALLEANZA_VERDI_SINISTRA',                                          label:'AVS',            color:'#00875a' },
    { id:'SINISTRA_PROGETTO_COMUNE',                                         label:'Sinistra PC',    color:'#8b1a1a' },
    { id:'SIAMO_EUROPEI_AZIONE_CON_CALENDA',                                 label:'Azione',         color:'#e07b00' },
    { id:'SARA_FUNARO_SINDACA',                                              label:'Funaro (civ.)',  color:'#e8a0a0' },
    { id:'FIRENZE_CAMBIA_ZINI_FRANCESCO_SINDACO',                            label:'FI Cambia',      color:'#7a9e7e' },
    { id:'RIBELLA_FIRENZE',                                                  label:'Ribella FI',     color:'#9b6b9b' },
    { id:'AL_CENTRO_CON_SACCARDI',                                           label:'Al Centro',      color:'#b8860b' },
    { id:'FIRENZE_AMBIENTALISTA_E_SOLIDALE_CITTADI_PACE',                    label:'Amb. Solidale',  color:'#2e8b57' },
    { id:'FIRENZE_VERA',                                                     label:'FI Vera',        color:'#cd853f' },
    { id:'FIRENZE_DEMOCRATICA_CON_CECILIA_DEL_RE',                           label:'FI Democratica', color:'#da70d6' },
    { id:'FIRENZE_RINASCE',                                                  label:'FI Rinasce',     color:'#708090' },
    { id:'ANIMA_FIRENZE',                                                    label:'Anima FI',       color:'#a0522d' },
    { id:'piuEUROPA',                                                        label:'+Europa',        color:'#4169e1' },
    { id:'CENTRO',                                                           label:'Centro',         color:'#808080' },
  ],
  reg2025: [
    { id:'PARTITO_DEMOCRATICO',                      label:'PD',              color:'#cc2222' },
    { id:'FRATELLI_DITALIA',                         label:'FdI',             color:'#1a3a8f' },
    { id:'FORZA_ITALIA_UDC_TOMASI_PRESIDENTE',       label:'FI',              color:'#0070bb' },
    { id:'LEGA_TOSCANA',                             label:'Lega',            color:'#009fe3' },
    { id:'MOVIMENTO_5_STELLE',                       label:'M5S',             color:'#c8a900' },
    { id:'ALLEANZA_VERDI_E_SINISTRA',                label:'AVS',             color:'#00875a' },
    { id:'TOSCANA_ROSSA',                            label:'Toscana Rossa',   color:'#8b1a1a' },
    { id:'EUGENIO_GIANI_PRESIDENTE_CASA_RIFORMISTA', label:'Casa Riformista', color:'#e07b00' },
    { id:'NOI_MODERATI_CIVICI_PER_TOMASI',           label:'Noi Moderati',    color:'#b8860b' },
    { id:'E_ORA_LISTA_CIVICA_TOMASI_PRESIDENTE',     label:'È Ora (civ.)',    color:'#4a90a4' },
  ],
  diff: [
    { id:'PD',           label:'PD ∆',            color:'#cc2222' },
    { id:'FdI',          label:'FdI ∆',           color:'#1a3a8f' },
    { id:'FI',           label:'FI ∆',            color:'#0070bb' },
    { id:'Lega',         label:'Lega ∆',          color:'#009fe3' },
    { id:'M5S',          label:'M5S ∆',           color:'#c8a900' },
    { id:'AVS',          label:'AVS ∆',           color:'#00875a' },
    { id:'ToscanaRossa', label:'Toscana Rossa ∆', color:'#8b1a1a' },
  ]
}

// ── STATE ────────────────────────────────────────────────────────────────────
const state = {
  election:'amm2024', party:PARTIES.amm2024[0], metric:'pct',
  locked:null, layerOn:true, data:{}
}

// ── MAP ──────────────────────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:false}).setView([43.775,11.255],13)
L.control.zoom({position:'bottomright'}).addTo(map)

const basemaps = {
  dark:      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap · © CartoDB',maxZoom:19}),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri · © USGS',maxZoom:19}),
  osm:       L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors',maxZoom:19})
}
basemaps.dark.addTo(map)
let geojsonLayer = null

// ── COLOR ────────────────────────────────────────────────────────────────────
function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function lerpColor(c1,c2,t){
  const[r1,g1,b1]=typeof c1==='string'?hexToRgb(c1):c1
  const[r2,g2,b2]=typeof c2==='string'?hexToRgb(c2):c2
  t=Math.max(0,Math.min(1,t))
  return`rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`
}
let currentRange={min:0,max:100}
function computeRange(geojson,field){
  const vals=geojson.features.map(f=>f.properties[field]).filter(v=>v!==null&&v!==undefined&&!isNaN(v))
  return{min:Math.min(...vals),max:Math.max(...vals)}
}
function getColor(value){
  if(value===null||value===undefined||isNaN(value))return'#1c1c1c'
  if(state.election==='diff'){
    const absMax=Math.max(Math.abs(currentRange.min),Math.abs(currentRange.max))||1
    const t=value/absMax
    if(t<0)return lerpColor('#ffffff','#3a7abf',Math.min(-t,1))
    if(t>0)return lerpColor('#ffffff','#bf3a3a',Math.min(t,1))
    return'#ffffff'
  }
  const{min,max}=currentRange
  return lerpColor('#1a1a1a',state.party.color,max===min?.5:(value-min)/(max-min))
}

// ── LEGEND ───────────────────────────────────────────────────────────────────
function updateLegend(){
  const isDiff=state.election==='diff'
  const bar=document.getElementById('legendBar')
  if(isDiff){
    const a=Math.max(Math.abs(currentRange.min),Math.abs(currentRange.max)).toFixed(1)
    bar.style.background='linear-gradient(to right,#3a7abf,#ffffff,#bf3a3a)'
    document.getElementById('legendMin').textContent=`−${a} pp`
    document.getElementById('legendMid').textContent='0'
    document.getElementById('legendMax').textContent=`+${a} pp`
  }else{
    const unit=state.metric==='pct'?'%':' votes'
    bar.style.background=`linear-gradient(to right,#1a1a1a,${state.party.color})`
    document.getElementById('legendMin').textContent=`${currentRange.min.toFixed(1)}${unit}`
    document.getElementById('legendMid').textContent=''
    document.getElementById('legendMax').textContent=`${currentRange.max.toFixed(1)}${unit}`
  }
}

// ── FIELDS ───────────────────────────────────────────────────────────────────
function getValueField(){
  const p=state.party.id
  if(state.election==='diff')return state.metric==='pct'?`${p}_diff_pct`:`${p}_diff_voti`
  return state.metric==='pct'?`${p}_pct`:p
}
function getLabelField(){
  const p=state.party.id
  if(state.election==='diff')return state.metric==='pct'?`${p}_diff_pct_label`:`${p}_diff_voti_label`
  return state.metric==='pct'?`${p}_label_pct`:`${p}_label_voti`
}

// ── INFO BOX ─────────────────────────────────────────────────────────────────
function updateInfoBox(props,locked){
  const val=props[getLabelField()]??props[getValueField()]??'—'
  const label=state.election==='diff'
    ?`∆ ${state.party.label} · Reg.2025 vs Amm.2024`
    :`${state.party.label} · ${state.election==='amm2024'?'Comunali 2024':'Regionali 2025'}`
  document.getElementById('infoBox').innerHTML=`
    <div class="info-sezione">Sezione ${props.Sezione??'—'}${locked?'<span class="locked-dot"></span>':''}</div>
    <div class="info-value">${val}</div>
    <div class="info-sub">${label}</div>`
}
function clearInfoBox(){
  document.getElementById('infoBox').innerHTML='<p class="info-placeholder">— hover or click a sezione —</p>'
}

// ── PIE CHART ────────────────────────────────────────────────────────────────
let pieChart=null
function updatePieChart(props){
  const labels=[],values=[],colors=[]
  PARTIES[state.election].forEach(p=>{
    const col=state.election==='diff'?`${p.id}_diff_pct`:`${p.id}_pct`
    const v=props[col]
    if(v!==null&&v!==undefined&&!isNaN(v)&&v>0){labels.push(p.label);values.push(+v.toFixed(2));colors.push(p.color)}
  })
  document.getElementById('pieEmpty').style.display='none'
  const canvas=document.getElementById('pieChart')
  canvas.style.display='block'
  if(pieChart)pieChart.destroy()
  pieChart=new Chart(canvas,{
    type:'doughnut',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:0,hoverOffset:3}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'52%',
      plugins:{
        legend:{position:'right',labels:{color:'#6b6760',font:{family:'DM Mono',size:9},boxWidth:8,padding:5}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.toFixed(2)}%`}}
      }}
  })
}

// ── BAR CHART ────────────────────────────────────────────────────────────────
// We keep a sorted index to map bar position → sezione
let barSorted = []
let barChart = null

function updateBarChart(geojson){
  const field=getValueField()
  barSorted=geojson.features
    .filter(f=>f.properties[field]!==null&&f.properties[field]!==undefined&&!isNaN(f.properties[field]))
    .sort((a,b)=>b.properties[field]-a.properties[field])

  if(barChart)barChart.destroy()
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{
      labels:barSorted.map(f=>`${f.properties.Sezione}`),
      datasets:[{
        data:barSorted.map(f=>f.properties[field]),
        backgroundColor:barSorted.map(f=>getColor(f.properties[field])),
        borderWidth:0,borderRadius:1
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:250},
      plugins:{legend:{display:false},tooltip:{
        callbacks:{
          title:items=>`Sezione ${barSorted[items[0].dataIndex]?.properties?.Sezione??''}`,
          label:ctx=>{
            const props=barSorted[ctx.dataIndex]?.properties
            return props?props[getLabelField()]??ctx.parsed.y:ctx.parsed.y
          }
        }
      }},
      scales:{
        x:{ticks:{display:false},grid:{color:'#1c1c1c'},border:{color:'#252525'}},
        y:{ticks:{color:'#6b6760',font:{family:'DM Mono',size:9},maxTicksLimit:4},grid:{color:'#1c1c1c'},border:{color:'#252525'}}
      },
      // Hover on bar → highlight matching polygon on map
      onHover:(evt,elements)=>{
        if(!geojsonLayer||!state.layerOn)return
        if(elements.length===0){
          // Reset all to normal (unless clicked/locked)
          geojsonLayer.eachLayer(l=>{
            if(state.locked!==l.feature?.properties?.Sezione)geojsonLayer.resetStyle(l)
          })
          return
        }
        const hoveredSezione=barSorted[elements[0].index]?.properties?.Sezione
        if(!hoveredSezione)return
        geojsonLayer.eachLayer(l=>{
          const s=l.feature?.properties?.Sezione
          if(s===state.locked)return // don't touch locked
          if(s===hoveredSezione){
            l.setStyle({weight:2,color:'#c8a96e',fillOpacity:.95})
            l.bringToFront()
            updateInfoBox(l.feature.properties,false)
          }else{
            geojsonLayer.resetStyle(l)
          }
        })
      }
    }
  })
}

// ── RENDER MAP ───────────────────────────────────────────────────────────────
function applyLayerVisibility(){
  if(!geojsonLayer)return
  geojsonLayer.eachLayer(l=>{
    const props=l.feature?.properties
    const field=getValueField()
    if(state.layerOn){
      const isLocked=state.locked===props?.Sezione
      l.setStyle({
        fillColor:getColor(props?.[field]),
        fillOpacity:isLocked?1:.82,
        color:isLocked?'#c8a96e':'#0d0d0d',
        weight:isLocked?2.5:.6
      })
    }else{
      // Outlines only
      l.setStyle({fillOpacity:0,color:'#555555',weight:.8})
    }
  })
}

function renderMap(geojson){
  if(geojsonLayer)map.removeLayer(geojsonLayer)
  const field=getValueField()
  currentRange=computeRange(geojson,field)

  geojsonLayer=L.geoJSON(geojson,{
    style:f=>({
      fillColor:getColor(f.properties[field]),
      fillOpacity:state.layerOn?.82:0,
      color:state.layerOn?'#0d0d0d':'#555555',
      weight:.6
    }),
    onEachFeature:(feature,layer)=>{
      const props=feature.properties
      layer.on('mouseover',function(){
        if(state.locked!==props.Sezione&&state.layerOn){
          this.setStyle({weight:2,color:'#c8a96e',fillOpacity:.95})
          this.bringToFront()
        }
        updateInfoBox(props,state.locked===props.Sezione)
      })
      layer.on('mouseout',function(){
        if(state.locked!==props.Sezione)geojsonLayer.resetStyle(this)
        if(!state.locked)clearInfoBox()
      })
      layer.on('click',function(){
        geojsonLayer.eachLayer(l=>geojsonLayer.resetStyle(l))
        if(state.locked===props.Sezione){
          state.locked=null
          clearInfoBox()
          document.getElementById('pieEmpty').style.display='block'
          document.getElementById('pieChart').style.display='none'
          if(pieChart){pieChart.destroy();pieChart=null}
        }else{
          state.locked=props.Sezione
          this.setStyle({weight:2.5,color:'#c8a96e',fillOpacity:1})
          this.bringToFront()
          updateInfoBox(props,true)
          updatePieChart(props)
        }
      })
    }
  }).addTo(map)

  updateLegend()
  updateBarChart(geojson)
}

// ── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadData(election){
  if(state.data[election])return state.data[election]
  try{
    const res=await fetch(DATA_URLS[election])
    if(!res.ok)throw new Error(`HTTP ${res.status}`)
    const json=await res.json()
    state.data[election]=json
    return json
  }catch(err){
    console.error('GeoJSON load failed:',err)
    alert(`Could not load data for "${election}".\n${err.message}`)
    return null
  }
}

async function update(){
  document.getElementById('loading').classList.remove('hidden')
  state.locked=null; clearInfoBox()
  const geojson=await loadData(state.election)
  document.getElementById('loading').classList.add('hidden')
  if(geojson)renderMap(geojson)
}

// ── PARTY SELECT ─────────────────────────────────────────────────────────────
function populatePartySelect(){
  const sel=document.getElementById('partySelect')
  sel.innerHTML=''
  PARTIES[state.election].forEach((p,i)=>{
    const opt=document.createElement('option')
    opt.value=i; opt.textContent=p.label; sel.appendChild(opt)
  })
  state.party=PARTIES[state.election][0]
}

// ── ADDRESS SEARCH ───────────────────────────────────────────────────────────
let searchTimeout=null
const searchInput=document.getElementById('searchInput')
const searchResults=document.getElementById('searchResults')

async function geocodeSearch(query){
  if(!query.trim()){searchResults.style.display='none';return}
  const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query+', Firenze, Italia')}&limit=5&addressdetails=1`
  try{
    const res=await fetch(url,{headers:{'Accept-Language':'it,en'}})
    const data=await res.json()
    searchResults.innerHTML=''
    if(!data.length){
      searchResults.innerHTML='<div class="search-result-item" style="cursor:default;color:#444">No results</div>'
    }else{
      data.forEach(item=>{
        const div=document.createElement('div')
        div.className='search-result-item'
        div.textContent=item.display_name
        div.addEventListener('click',()=>{
          map.setView([+item.lat,+item.lon],17)
          searchResults.style.display='none'
          searchInput.value=item.display_name.split(',')[0]
        })
        searchResults.appendChild(div)
      })
    }
    searchResults.style.display='block'
  }catch(e){console.error('Search error:',e)}
}

searchInput.addEventListener('input',()=>{clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>geocodeSearch(searchInput.value),450)})
document.getElementById('searchBtn').addEventListener('click',()=>geocodeSearch(searchInput.value))
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter')geocodeSearch(searchInput.value)})
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))searchResults.style.display='none'})

// ── BASEMAP TOGGLE ───────────────────────────────────────────────────────────
document.querySelectorAll('[data-bm]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-bm]').forEach(b=>b.classList.remove('active'))
    btn.classList.add('active')
    Object.values(basemaps).forEach(l=>map.removeLayer(l))
    basemaps[btn.dataset.bm].addTo(map)
    if(geojsonLayer)geojsonLayer.bringToFront()
  })
})

// ── LAYER TOGGLE ─────────────────────────────────────────────────────────────
document.getElementById('layerToggle').addEventListener('click',function(){
  state.layerOn=!state.layerOn
  this.textContent=state.layerOn?'● ON':'○ OFF'
  this.classList.toggle('on',state.layerOn)
  applyLayerVisibility()
})

// ── RESIZE PANEL ─────────────────────────────────────────────────────────────
const panel=document.getElementById('panel')
const panelDrag=document.getElementById('panelResize')
let isDraggingPanel=false
panelDrag.addEventListener('mousedown',e=>{isDraggingPanel=true;panelDrag.classList.add('dragging');e.preventDefault()})
document.addEventListener('mousemove',e=>{
  if(!isDraggingPanel)return
  const newW=Math.max(180,Math.min(520,e.clientX-panel.parentElement.getBoundingClientRect().left))
  panel.style.width=newW+'px'; map.invalidateSize()
})
document.addEventListener('mouseup',()=>{if(isDraggingPanel){isDraggingPanel=false;panelDrag.classList.remove('dragging')}})

// ── RESIZE BAR ───────────────────────────────────────────────────────────────
const barSection=document.getElementById('barSection')
const barDrag=document.getElementById('barResize')
let isDraggingBar=false
barDrag.addEventListener('mousedown',e=>{isDraggingBar=true;barDrag.classList.add('dragging');e.preventDefault()})
document.addEventListener('mousemove',e=>{
  if(!isDraggingBar)return
  const newH=Math.max(60,Math.min(400,barSection.parentElement.getBoundingClientRect().bottom-e.clientY))
  barSection.style.height=newH+'px'; map.invalidateSize(); if(barChart)barChart.resize()
})
document.addEventListener('mouseup',()=>{if(isDraggingBar){isDraggingBar=false;barDrag.classList.remove('dragging')}})

// ── EVENTS ───────────────────────────────────────────────────────────────────
document.getElementById('electionSelect').addEventListener('change',e=>{
  state.election=e.target.value; populatePartySelect(); update()
})
document.getElementById('partySelect').addEventListener('change',e=>{
  state.party=PARTIES[state.election][parseInt(e.target.value)]
  state.locked=null; clearInfoBox()
  if(state.data[state.election])renderMap(state.data[state.election])
})
document.querySelectorAll('[data-metric]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-metric]').forEach(b=>b.classList.remove('active'))
    btn.classList.add('active'); state.metric=btn.dataset.metric
    state.locked=null; clearInfoBox()
    if(state.data[state.election])renderMap(state.data[state.election])
  })
})

// ── INIT ─────────────────────────────────────────────────────────────────────
populatePartySelect()
update()
</script>
</body>
</html>
